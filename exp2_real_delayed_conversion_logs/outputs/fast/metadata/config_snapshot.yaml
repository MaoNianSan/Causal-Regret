  metadata: outputs/fast/metadata
  precheck: outputs/fast/precheck
  raw: outputs/fast/raw
  processed: outputs/fast/processed
  summaries: outputs/fast/summaries
  tables: outputs/fast/tables
  figures: outputs/fast/figures
  checks: outputs/fast/checks
  legacy: outputs/fast/legacy
  self_check: outputs/fast/checks
runtime:
  n_jobs: auto
  host_logical_cpus: 32
  resolved_bootstrap_workers: 4
  mode: fast
  uid_bootstrap_replicates: 200
