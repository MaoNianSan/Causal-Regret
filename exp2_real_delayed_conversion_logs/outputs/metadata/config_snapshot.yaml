experiment:
  experiment_id: exp2_logged_attribution_sensitivity
  title: "Experiment 2: Source-time attribution sensitivity in delayed conversion logs"
  claim: "On an observational delayed-conversion log, changing the route that assigns an arriving conversion to source-time decision cells can change offline credited-conversion summaries and top-k decision-cell rankings."
  scope_boundary: "This is a logged attribution-sensitivity diagnostic, not online policy evaluation, randomized causal identification, not causal regret estimation, or an economic ROI estimate."

data:
  dataset_name: criteo_attribution_modeling_for_bidding
  raw_file: "inputs/pcb_dataset_final.tsv"
  sep: "\t"
  timestamp_unit: seconds
  observation_window_days: 30
  chunk_size: 500000
  exact_uid_count: true

columns:
  timestamp: timestamp
  uid: uid
  campaign: campaign
  conversion: conversion
  conversion_timestamp: conversion_timestamp
  conversion_id: conversion_id
  attribution: attribution
  click: click
  click_pos: click_pos
  click_nb: click_nb
  time_since_last_click: time_since_last_click
  cost: cost
  cpo: cpo

action:
  # Campaign alone can be constant along a conversion path in this public log.
  # The primary credit unit is therefore a coarsened source-time decision cell:
  # (mapped campaign, source calendar day). This remains a source-event credit
  # diagnostic, rather than a campaign-level policy-ranking claim.
  action_unit: campaign_source_day_cell
  candidate_campaign_count_requested: 50
  candidate_campaign_count_minimum: 20
  min_conversion_rows_per_campaign: 100
  source_time_bin: calendar_day
  min_impressions_per_decision_cell: 50
  minimum_eligible_decision_cells: 60
  main_top_k: 10
  sensitivity_top_k: [10, 20, 50]

subsets:
  main_cohort_id: all_conversion_candidates
  source_linked_audit_cohort_id: unique_labelled_conversion_candidates
  main_cohort_definition: "Converted journeys with at least one eligible campaign-source-day candidate cell, a valid constructed arrival-bin anchor cell, and exactly one nonmissing UID across retained candidate touches."
  source_linked_audit_definition: "The main cohort restricted to journeys with exactly one attributed eligible candidate row. It is an audit subset, not complete source ground truth."

candidate_set:
  window_days_main: 30
  window_days_sensitivity: [1, 7, 14, 30]
  common_window_cohort_rule: "For window sensitivity, compare routes only on conversion IDs with at least one eligible candidate cell under every requested window."

attribution_routes:
  main:
    - arrival_bin_anchor
    - first_click
    - last_click
    - linear_attribution
    - time_decay_soft
    - soft_attribution_em
  appendix:
    - last_touch
    - uniform_soft
    - click_prior_soft
  audit_reference: source_linked_reference
  route_order:
    - arrival_bin_anchor
    - first_click
    - last_click
    - linear_attribution
    - time_decay_soft
    - soft_attribution_em
    - last_touch
    - uniform_soft
    - click_prior_soft
    - source_linked_reference

utility:
  main: binary_credited_conversion_mass
  score_definition: "credited conversion mass divided by eligible decision-cell impressions"
  offline_utility_definition: "For the route-specific top-k decision-cell set, sum route-reported credited conversion mass. This is a logged credit summary, not an identified policy value."
  main_cost_lambda: 0.0
  cost_lambda_sensitivity: [0.1, 0.5, 1.0]
  cost_normalization: "Action-cell total cost divided by the median positive action-cell mean cost. Cost is a transformed data field and is appendix-only."

soft_attribution:
  time_decay_lambda_main: 0.5
  click_prior_alpha_main: 1.0

em_soft_attribution:
  max_iter: 50
  tolerance: 1.0e-8
  click_coefficient: 0.50
  recency_coefficient: 0.50
  prior_strength: 1.0
  description: "EM-style responsibility allocator over source-time decision cells. Diagnostic only; not a causal model or deployable policy."

statistics:
  uid_bootstrap:
    n_bootstrap: 1000
    fast_n_bootstrap: 200
    seed_base: 20260622
    ci_level: 0.95
    algorithm: multinomial_uid_cluster_bootstrap
    batch_size: 10
    description: "Percentile bootstrap resampling eligible conversion users with replacement. Intervals quantify sampling variation in logged credit summaries, not causal policy uncertainty."

reporting:
  # EM remains in route computation and non-degeneracy diagnostics, but it is not a main-text comparator.
  main_figure_routes:
    - arrival_bin_anchor
    - first_click
    - last_click
    - linear_attribution
    - time_decay_soft
  core_source_routes:
    - first_click
    - last_click
    - linear_attribution
    - time_decay_soft
  pairwise_overlap_routes:
    - first_click
    - last_click
    - linear_attribution
    - time_decay_soft

scientific_gates:
  min_decision_cell_ambiguity_rate: 0.01
  min_core_pairwise_tv: 0.000001
  min_em_positive_entropy_share: 0.001
  max_top_k_must_be_strictly_below_action_universe: true

parallel:
  n_jobs: auto
  reserve_cores: 2
  bootstrap_max_workers: 4
  blas_threads_per_worker: 1

plots:
  save_pdf: true
  save_png: true
  dpi: 600
  paper_figure_width_in: 6.85
  axis_label_font_size: 8.5
  tick_font_size: 7.5
  legend_font_size: 7.0
  panel_label_font_size: 9.0
  line_width: 1.2
  marker_size: 4.0
  ci_alpha: 0.15

outputs:
  root: outputs
  metadata: outputs/metadata
  precheck: outputs/precheck
  raw: outputs/raw
  processed: outputs/processed
  summaries: outputs/summaries
  tables: outputs/tables
  figures: outputs/figures
  checks: outputs/checks
  legacy: outputs/legacy
  self_check: outputs/checks
